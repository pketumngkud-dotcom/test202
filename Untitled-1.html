<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card Flip</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Untitled-1.css">
</head>
<body>

    <div class="card">
        <div class="card-inner">

            <div class="card-front">
                <div class="card-image cake-img"></div>
                <div class="category">Happy Birthday!</div>
                <div class="heading">Open เพื่อดูเซอร์ไพรส์ด้านหลังนะ 🎂</div>
            </div>
            <div class="card-back">
                <div class="card-image person-img"></div>
                <div class="heading">
                    เย้! สุขสันต์วันเกิดนะเพื่อน <br>
                    ขอให้มีความสุขมากๆ <br>
                    จาก <span class="name">Champ</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
